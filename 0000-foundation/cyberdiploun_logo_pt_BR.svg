
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background bordô ainda mais claro -->
  <rect width="800" height="200" fill="#A63255"/>

  <!-- Gold border lines -->
  <rect x="0" y="0" width="800" height="3" fill="#C8A84B"/>
  <rect x="0" y="197" width="800" height="3" fill="#C8A84B"/>

  <!-- Left/right vertical bars -->
  <rect x="30" y="20" width="2" height="160" fill="#C8A84B" opacity="0.75"/>
  <rect x="768" y="20" width="2" height="160" fill="#C8A84B" opacity="0.75"/>

  <!-- Corner ornaments -->
  <line x1="32" y1="20" x2="62" y2="20" stroke="#C8A84B" stroke-width="1.5" opacity="0.75"/>
  <line x1="32" y1="180" x2="62" y2="180" stroke="#C8A84B" stroke-width="1.5" opacity="0.75"/>
  <line x1="768" y1="20" x2="738" y2="20" stroke="#C8A84B" stroke-width="1.5" opacity="0.75"/>
  <line x1="768" y1="180" x2="738" y2="180" stroke="#C8A84B" stroke-width="1.5" opacity="0.75"/>

  <!-- Thin accent lines -->
  <rect x="0" y="8" width="800" height="1" fill="#0E2557" opacity="0.35"/>
  <rect x="0" y="191" width="800" height="1" fill="#0E2557" opacity="0.35"/>

  <!-- Central emblem circles -->
  <circle cx="400" cy="100" r="60" fill="none" stroke="#C8A84B" stroke-width="0.8" opacity="0.2"/>
  <circle cx="400" cy="100" r="52" fill="none" stroke="#C8A84B" stroke-width="0.4" opacity="0.12"/>

  <!-- Subtle monogram -->
  <text x="400" y="113" font-family="Georgia, serif" font-size="48" font-weight="700"
        fill="#7B1F3A" opacity="0.2" text-anchor="middle" letter-spacing="2">CD</text>

  <!-- Divider lines -->
  <line x1="60" y1="90" x2="185" y2="90" stroke="#C8A84B" stroke-width="0.8" opacity="0.55"/>
  <line x1="615" y1="90" x2="740" y2="90" stroke="#C8A84B" stroke-width="0.8" opacity="0.55"/>

  <!-- Diamond ornaments -->
  <polygon points="117,90 122,85 127,90 122,95" fill="#C8A84B" opacity="0.75"/>
  <polygon points="673,90 678,85 683,90 678,95" fill="#C8A84B" opacity="0.75"/>

  <!-- Main Title -->
  <text x="400" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700"
        text-anchor="middle" letter-spacing="4">
    <tspan fill="#D6EAFF">cyber</tspan><tspan fill="#FFF0A0">Diploun</tspan>
  </text>

  <!-- Thin rule below title -->
  <line x1="200" y1="118" x2="600" y2="118" stroke="#C8A84B" stroke-width="0.6" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="400" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="400"
        fill="#FFF0A0" text-anchor="middle" letter-spacing="5" opacity="0.9">
    TECNOLOGIA · DIPLOMACIA · FILOSOFIA
  </text>

</svg>
